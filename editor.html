<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>A vos mots ! - Editeur</title>

  <link rel="stylesheet" href="styles.css" />
</head>

<body class="editor">
  <header class="topbar">
    <div class="brand">
      <div class="logo">A vos mots !</div>
      <div class="subtitle">Editeur de grille</div>
    </div>

    <div class="right">
      <a class="btn ghost" href="index.html">Retour regie</a>
    </div>
  </header>

  <main class="editor-layout">
    <section class="panel editor-panel">
      <h2>Grille</h2>

      <label class="label" for="gridName">Nom</label>
      <input id="gridName" class="input" type="text" autocomplete="off" />

      <div class="row">
        <div class="field">
          <label class="label" for="gridRows">Lignes</label>
          <input id="gridRows" class="input" type="number" min="3" max="30" />
        </div>
        <div class="field">
          <label class="label" for="gridCols">Colonnes</label>
          <input id="gridCols" class="input" type="number" min="3" max="30" />
        </div>
      </div>

      <div class="row small">
        <button id="applySize" class="btn" type="button">Appliquer taille</button>
        <button id="newGrid" class="btn ghost" type="button">Nouvelle grille</button>
      </div>

      <div class="row small">
        <label class="label" for="gridList">Grilles locales</label>
        <select id="gridList" class="select"></select>
      </div>
      <div class="row small">
        <label class="label" for="gridFileSelect">Grilles (dossier)</label>
        <select id="gridFileSelect" class="select"></select>
      </div>

      <div class="row small">
        <button id="deleteGrid" class="btn danger" type="button">Supprimer</button>
      </div>

      <div class="kv selection-block">
        <div class="k">Selection</div>
        <div class="v" id="selectionInfo">-</div>
      </div>
      <label class="label" for="definitionInput">Definition</label>
      <textarea id="definitionInput" class="input" rows="4"></textarea>

      <div class="row small">
        <button id="saveDefinition" class="btn success" type="button">Sauver definition</button>
        <button id="clearDefinition" class="btn ghost" type="button">Effacer</button>
      </div>

      <div class="kv selection-block">
        <div class="k">Mot magique</div>
        <div class="v" id="magicWordInfo">-</div>
      </div>
      <div class="row small">
        <button id="setMagicWord" class="btn" type="button" disabled>Definir mot magique</button>
        <button id="clearMagicWord" class="btn ghost" type="button" disabled>Retirer</button>
      </div>

      <h2>Stockage</h2>
      <div class="row small">
        <button id="exportGrid" class="btn" type="button">Exporter JSON</button>
        <button id="importGrid" class="btn" type="button">Importer JSON</button>
        <input id="importFile" class="visually-hidden" type="file" accept="application/json" multiple />
      </div>

      <div class="note" id="statusMsg">Pret.</div>

      <h2>Saisie & orientation</h2>
      <div class="row small">
        <button id="orientationToggle" class="btn" type="button">Orientation: Horizontal</button>
      </div>
    </section>

    <section class="panel editor-panel">
      <div class="grid-wrap">
        <div id="editorGrid" class="grid editor-grid" aria-label="Grille editeur"></div>
      </div>
    </section>
  </main>

  <script src="libs/xlsx.full.min.js"></script>
  <script src="editor.js"></script>
</body>
</html>
